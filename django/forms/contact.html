{# FORM TAGS FOR HTML #}

{{ form.name.errors }}
{{ form.name }}

{# BASIC CONTACT FORM HTML #}

<form method="post" action="{% url 'email-contact' %}" class="form-validation" autocomplete="off">

    {% csrf_token %}

    <div class="row">
        <div class="col-sm-6">
            {{ form.name }}
        </div>
        <div class="col-sm-6">
            {{ form.email }}
        </div>
    </div>

    {{ form.message }}
    <button class="theme-button p-bg-color hvr-float-shadow">Submit Message</button>
</form>
